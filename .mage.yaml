project:
  name: lucid
  binary: lucid
  module: github.com/mrz1836/lucid
  main: ./cmd/lucid/main.go

build:
  # Custom ldflags with version injection (consumed by cmd/lucid/main.go).
  ldflags:
    - "-s -w"
    - "-X main.version={{.Version}}"
    - "-X main.commit={{.Commit}}"
    - "-X main.buildDate={{.Date}}"
  flags:
    - "-trimpath"
  output: "./cmd/lucid"

test:
  # Match CI timeout configuration; the default magex timeout (10m) can
  # kill the race+cover suite prematurely on a cold cache.
  timeout: 30m
